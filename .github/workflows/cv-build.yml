name: Build Site and CV

on:
  push:
    branches:
      - master
    paths:
      - 'docs/**'
      - '.github/workflows/cv-build.yml'
      - 'Makefile'
  workflow_dispatch:

# Serialize runs so two builds don't try to commit the regenerated CV to the
# same branch at once (the second push would be rejected with "fetch first").
concurrency:
  group: build-site-and-cv-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: docs

      - name: Install TeX Live and xelatex
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-xetex texlive-fonts-recommended texlive-fonts-extra texlive-latex-extra
          sudo apt-get install -y fonts-roboto fonts-font-awesome
          xelatex --version

      - name: Build CV
        run: |
          make clean
          make cv

      - name: Commit CV
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'github-actions@github.com'
          git add docs/public/Alessandro_Sanvito_CV.pdf
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Update CV"
          # The remote branch may have advanced since checkout (e.g. concurrent
          # pushes). Rebase onto the latest remote tip and retry the push a few
          # times so the build artifact lands without failing the run.
          branch='${{ github.ref_name }}'
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:"$branch"; then
              echo "Push succeeded on attempt $attempt"
              exit 0
            fi
            echo "Push rejected (attempt $attempt); rebasing onto origin/$branch and retrying"
            git fetch origin "$branch"
            git rebase "origin/$branch"
            sleep $((attempt * 2))
          done
          echo "Failed to push CV update after multiple attempts"
          exit 1

      - name: Build Jekyll site
        working-directory: docs
        run: bundle exec jekyll build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/_site
          commit_message: "Update site and CV"
